name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ] # или master, смотря какая у тебя основная

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8 # или 9

      - name: Set Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: src/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install
        working-directory: ./src

      - name: Static HTML Export
        run: pnpm generate
        working-directory: ./src

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/.output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4